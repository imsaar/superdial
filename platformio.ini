[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
lib_deps =
    bodmer/TFT_eSPI
build_flags =
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=1
    -DTFT_SCLK=0
    -DTFT_CS=3
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000
